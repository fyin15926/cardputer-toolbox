<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DSEG Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "FallbackMono";
      src: local("Consolas");
    }

    :root {
      --bg: #050706;
      --panel: #0b120e;
      --line: #1a3d26;
      --text: #79ff9c;
      --dim: #40734f;
      --soft: #16311e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #102417 0, transparent 38%),
        linear-gradient(180deg, #030403 0, var(--bg) 100%);
      color: var(--text);
      font-family: "FallbackMono", monospace;
    }

    .wrap {
      width: min(760px, calc(100vw - 32px));
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18, 34, 24, 0.8), rgba(8, 14, 10, 0.96));
      padding: 20px;
      box-shadow: inset 0 0 0 1px rgba(121, 255, 156, 0.04);
    }

    .label {
      margin: 0 0 14px;
      color: var(--dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .screen {
      border: 1px solid var(--soft);
      background: #020302;
      padding: 16px 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(64, 115, 79, 0.18);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .dseg {
      font-family: "DSEG14 Classic", "Orbitron", monospace;
      font-size: 24px;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 8px rgba(121, 255, 156, 0.18);
      white-space: nowrap;
    }

    .big {
      font-size: 44px;
    }

    .dim {
      color: var(--dim);
      text-shadow: none;
    }

    .note {
      font-family: "Orbitron", sans-serif;
      font-size: 13px;
      color: var(--dim);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <p class="label">Closest To Current List Style</p>
      <div class="screen">
        <div class="row">
          <span class="dseg">0007</span>
          <span class="dseg dim">K:A</span>
          <span class="dseg dim">00:03</span>
        </div>
        <div class="row">
          <span class="dseg">0124</span>
          <span class="dseg dim">IMP</span>
          <span class="dseg dim">00:11</span>
        </div>
        <div class="row">
          <span class="dseg">0288</span>
          <span class="dseg dim">WT</span>
          <span class="dseg dim">00:27</span>
        </div>
      </div>
      <div class="note">这块最接近你现在固件列表里的数码管风格。</div>
    </section>

    <section class="panel">
      <p class="label">Large Note Display</p>
      <div class="screen">
        <div class="dseg big">C#4</div>
      </div>
      <div class="note">这是把同类风格拿来做中间大音名时的大概效果。</div>
    </section>
  </main>
</body>
</html>
